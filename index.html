<select id="fund">
  <option value="g35">ชีวิต 35</option>
  <option value="bond">ตราสารหนี้</option>
  <option value="gold">ทองคำ</option>
</select>

<canvas id="myChart"></canvas>

<script>
let chart;

fetch('data.json')
.then(res => res.json())
.then(data => {

  function draw(fund){
    const labels = data.map(d => d.date);
    const values = data.map(d => d[fund]);

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById('myChart'), {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: fund,
          data: values
        }]
      }
    });
  }

  draw('g35');

  document.getElementById('fund').addEventListener('change', e=>{
    draw(e.target.value);
  });

});
</script>
