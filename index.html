<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ข้อมูลมูลค่าต่อหน่วย (GPF)</title>
    <!-- ใช้ฟอนต์ภาษาไทยสวยๆ -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        
        /* จัดวางแบบการ์ด */
        #card-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        /* ตัวการ์ด */
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px; /* ความกว้างสูงสุด */
            overflow: hidden;
            border: 1px solid #e1e4e8;
        }

        .card-header {
            background: #0056b3;
            color: white;
            padding: 15px 20px;
            font-size: 1.2em;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .card-body {
            padding: 20px;
            display: grid;
            /* แบ่งเป็น 2 คอลัมน์ในมือถือ, 3-4 คอลัมน์ในจอใหญ่ */
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }

        .fund-item {
            display: flex;
            flex-direction: column;
            border-bottom: 1px dashed #eee;
            padding-bottom: 5px;
        }
        
        .fund-name {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 2px;
        }
        
        .fund-value {
            font-size: 1.1em;
            font-weight: bold;
            color: #0056b3;
        }
    </style>
</head>
<body>

    <h2>📊 ข้อมูลมูลค่าต่อหน่วย (GPF)</h2>
    <div id="card-container">กำลังโหลด...</div>

    <script>
        // แปลงชื่อตัวแปรภาษาอังกฤษ เป็นชื่อไทยสวยๆ
        const fundNames = {
            "g35": "แผนเชิงรุก 35",
            "bond": "แผนตราสารหนี้",
            "gold": "แผนทองคำ",
            "short_term": "เงินฝาก/ตราสารหนี้ระยะสั้น",
            "basic": "ลงทุนพื้นฐานทั่วไป",
            "vayu": "กองทุนรวมวายุภักษ์",
            "foreign_bond": "ตราสารหนี้ต่างประเทศ",
            "aggressive_20": "แผนเชิงรุก 20",
            "aggressive_65": "แผนเชิงรุก 65",
            "reit": "กองทุนอสังหาฯ ไทย",
            "foreign_stock": "หุ้นต่างประเทศ",
            "thai_stock": "หุ้นไทย",
            "aggressive_75": "แผนเชิงรุก 75",
            "retirement_2569": "เกษียณสบายใจ 2569",
            "shariah": "การลงทุนหลักชะรีอะฮ์"
        };

        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('card-container');
                container.innerHTML = ''; // ล้างข้อความโหลด

                data.forEach(item => {
                    // สร้างการ์ดแต่ละใบ
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    // หัวการ์ด (วันที่)
                    const header = document.createElement('div');
                    header.className = 'card-header';
                    header.innerHTML = `<span>📅 ${item.date}</span>`;
                    card.appendChild(header);

                    // เนื้อหาการ์ด
                    const body = document.createElement('div');
                    body.className = 'card-body';

                    // วนลูปสร้างข้อมูลกองทุน
                    Object.keys(item).forEach(key => {
                        if (key !== 'date') {
                            const div = document.createElement('div');
                            div.className = 'fund-item';
                            
                            // ดึงชื่อไทย ถ้าไม่มีใช้ชื่ออังกฤษแทน
                            const name = fundNames[key] || key;
                            
                            div.innerHTML = `
                                <span class="fund-name">${name}</span>
                                <span class="fund-value">${item[key]}</span>
                            `;
                            body.appendChild(div);
                        }
                    });

                    card.appendChild(body);
                    container.appendChild(card);
                });
            })
            .catch(error => {
                document.getElementById('card-container').innerText = 'โหลดข้อมูลไม่ได้';
            });
    </script>

</body>
</html>
