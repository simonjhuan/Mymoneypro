<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ข้อมูลมูลค่าต่อหน่วย (GPF)</title>
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            margin: 20px;
            background-color: #f4f6f9;
            color: #333;
        }
        h2 {
            text-align: center;
            color: #003366;
        }
        .table-container {
            overflow-x: auto; /* ให้เลื่อนตารางซ้ายขวาได้ถ้าจอมือถือเล็ก */
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #0056b3;
            color: white;
            position: sticky;
            top: 0;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        tr:hover {
            background-color: #e2e6ea;
        }
        /* ไฮไลท์วันที่ */
        .date-col {
            font-weight: bold;
            color: #0056b3;
            text-align: left;
        }
    </style>
</head>
<body>

    <h2>📊 ตารางข้อมูลมูลค่าต่อหน่วย</h2>

    <div class="table-container">
        <table id="data-table">
            <thead>
                <tr>
                    <th>วันที่</th>
                    <!-- หัวตารางจะถูกสร้างอัตโนมัติจาก JSON -->
                </tr>
            </thead>
            <tbody>
                <!-- ข้อมูลจะถูกเติมที่นี่ -->
            </tbody>
        </table>
    </div>

    <script>
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                const table = document.getElementById('data-table');
                const thead = table.querySelector('thead tr');
                const tbody = table.querySelector('tbody');

                // 1. หาชื่อหัวข้อทั้งหมด (ยกเว้น date)
                // สมมติข้อมูลแรกมี key ครบ
                const firstItem = data[0];
                const headers = Object.keys(firstItem).filter(key => key !== 'date');

                // 2. สร้างหัวตาราง
                headers.forEach(header => {
                    const th = document.createElement('th');
                    // แปลงชื่อตัวแปรภาษาอังกฤษเป็นภาษาไทยสวยงาม (Optional)
                    th.innerText = header; 
                    thead.appendChild(th);
                });

                // 3. สร้างแถวข้อมูล
                data.forEach(row => {
                    const tr = document.createElement('tr');
                    
                    // วันที่
                    const tdDate = document.createElement('td');
                    tdDate.classList.add('date-col');
                    tdDate.innerText = row.date;
                    tr.appendChild(tdDate);

                    // ข้อมูลกองทุน
                    headers.forEach(header => {
                        const td = document.createElement('td');
                        td.innerText = row[header];
                        tr.appendChild(td);
                    });

                    tbody.appendChild(tr);
                });
            })
            .catch(error => {
                console.error('Error:', error);
                document.body.innerHTML = '<p style="text-align:center; color:red;">โหลดข้อมูลไม่ได้</p>';
            });
    </script>

</body>
</html>
