<script>
let chart;

fetch('data.json')
.then(res => res.json())
.then(data => {

  const labels = data.map(d => d.date);
  
  // สร้างกราฟที่มี 3 เส้นพร้อมกัน
  chart = new Chart(document.getElementById('myChart'), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: 'ชีวิต 35',
          data: data.map(d => d.g35),
          borderColor: '#36a2eb',
          backgroundColor: 'rgba(54, 162, 235, 0.1)',
          borderWidth: 2,
          fill: false,
          tension: 0.3
        },
        {
          label: 'ตราสารหนี้',
          data: data.map(d => d.bond),
          borderColor: '#ff6384',
          backgroundColor: 'rgba(255, 99, 132, 0.1)',
          borderWidth: 2,
          fill: false,
          tension: 0.3
        },
        {
          label: 'ทองคำ',
          data: data.map(d => d.gold),
          borderColor: '#ffcd56',
          backgroundColor: 'rgba(255, 206, 86, 0.1)',
          borderWidth: 2,
          fill: false,
          tension: 0.3
        }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { 
          display: true,
          position: 'top'
        },
        tooltip: { 
          mode: 'index', 
          intersect: false 
        }
      },
      scales: {
        y: { 
          beginAtZero: false,
          grid: {
            color: 'rgba(0,0,0,0.05)'
          }
        },
        x: {
          grid: {
            color: 'rgba(0,0,0,0.05)'
          }
        }
      }
    }
  });

});
</script>
